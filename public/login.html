<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=7, initial-scale=1.0">
    <script src="/public/js/sessao.js"></script>
    <title>Login</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/login.css">
</head>

<body>
    <header>

        <div id="logo">
            <a href="./index.html">
                <img src="./assets/imagens/Logo.svg" alt="">
            </a>
            <h2>SondMind</h2>
        </div>

    </header>

    <section id="Login">
        <div id="conteiner_informacoes">

            <div id="texto_login">
                <h2>Login</h2><br>
                <p>Sua mente tem um ritmo. Preparado para o dessafio?</p><br>
            </div>

            <input id="email_input" type="text" placeholder="Email"><br><br>
            <input id="senha_input" type="text" placeholder="Senha"><br><br>

            <div id="mensagem_erro"></div>

            <button id="loginButton" onclick="entrar()"><b>Login</button><br>

            <a href="/public/cadastro.html">Cadastre-se</a>

        </div>
        <div id="conteiner_imagem_login">

            <img src="./assets/imagens/imagem_login.png" alt="">
        </div>

    </section>

</body>

</html>

<script>


    function entrar() {

        loginButton.disabled = true


        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            loginButton.disabled = false


        }
        else {

            console.log("FORM LOGIN: ", emailVar);
            console.log("FORM SENHA: ", senhaVar);

            fetch("http://localhost:3333/usuarios/autenticar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    emailServer: emailVar,
                    senhaServer: senhaVar
                })
            }).then(function (resposta) {
                console.log("ESTOU NO THEN DO entrar()!")

                if (resposta.ok) {
                    console.log(resposta);

                    resposta.json().then(json => {
                        console.log(json);
                        console.log(JSON.stringify(json));
                        sessionStorage.EMAIL_USUARIO = json.email;
                        sessionStorage.NOME_USUARIO = json.nome;
                        sessionStorage.ID_USUARIO = json.id;


                        setTimeout(function () {
                            window.location = "./telahome.html";
                        }, 1000);

                    });

                } else {

                    console.log("Houve um erro ao tentar realizar o login!");
                    loginButton.disabled = false


                    resposta.text().then(texto => {
                        console.error(texto);
                        loginButton.disabled = false

                    });
                }

            }).catch(function (erro) {
                console.log(erro);
                loginButton.disabled = false

            })

            return false;
        }
    }


</script>
